<header class="hero-header">
  <app-carousel
    [backgroundImages]="carouselImages"
    [thumbnailMode]="false"
    class="hero-carousel"
  ></app-carousel>

  <div class="hero-overlay">
    <div class="hero-content text-center">
      <!-- Greeting Badge -->
      <div class="greeting-badge mb-4">
        <span class="wave-emoji">👋</span>
        <span class="greeting-text">{{ greeting }}</span>
      </div>

      <!-- Main Name Heading -->
      <h1 class="hero-title mb-3">
        {{ heading }}
      </h1>

      <!-- Typing Subheading -->
      <div class="typing-container">
        <ngx-typed-js
          class="sub-heading"
          [strings]="subHeading"
          [loop]="true"
          [typeSpeed]="60"
          [backDelay]="3000"
          [showCursor]="true"
          [cursorChar]="'|'"
        >
          <span class="typing typing-accent"></span>
        </ngx-typed-js>
      </div>

      <!-- Scroll Indicator -->
      <div class="scroll-indicator" (click)="scrollToAbout()">
        <span class="mouse-icon">
          <span class="mouse-wheel"></span>
        </span>
        <span class="scroll-text">Scroll Down</span>
      </div>
    </div>
  </div>
</header>
