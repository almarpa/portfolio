<div class="skill-card focus">
  <div class="skill-card-body">
    <h3 class="skill-category-title">{{ skill.description }}</h3>
    <div class="tech-pills-container">
      <div class="tech-pill" *ngFor="let technology of skill.technologies">
        <img
          class="tech-logo"
          src="{{ technology.logo }}"
          alt="{{ technology.name }}"
        />
        <span class="tech-name">{{ technology.name }}</span>
      </div>
    </div>
  </div>
</div>
